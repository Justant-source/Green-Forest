# ===== Production 환경 =====
# 실행: docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d

services:
  mysql:
    image: mysql:8.0
    container_name: greenforest-mysql-prod
    # 외부 포트 미노출 — 컨테이너 내부 네트워크에서만 접근
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: vgc_db
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: greenforest-backend-prod
    # 외부 포트 미노출 — nginx를 통해서만 접근
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: vgc_db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_PATH: /app/uploads
      NOTIFY_API_TOKEN: ${NOTIFY_API_TOKEN}
    volumes:
      - uploads_prod:/app/uploads
      - logs_prod:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_IMAGE_BASE_URL: ${NEXT_PUBLIC_IMAGE_BASE_URL}
    container_name: greenforest-frontend-prod
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: greenforest-nginx-prod
    ports:
      - "80:80"               # 운영: http://서버IP (포트 80)
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  # name을 고정하여 compose project name이 바뀌어도 동일 볼륨을 재사용한다.
  # (과거 project명 변경으로 빈 볼륨이 새로 생긴 사고 재발 방지)
  mysql_prod_data:
    name: green-forest-prod_mysql_prod_data
  uploads_prod:
    name: green-forest-prod_uploads_prod
  logs_prod:
    name: green-forest-prod_logs_prod
