# ===== Production 환경 =====
# 실제 값은 서버의 .env.prod 또는 시스템 환경변수로 주입
# 이 파일 자체에는 민감정보 없음 — git 추적 가능

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:vgc_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

server.port=9090

jwt.secret=${JWT_SECRET}

# Admin initial password
app.admin.password=${ADMIN_PASSWORD}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Upload paths
file.upload-dir=${UPLOAD_PATH:/app/uploads}
app.upload.path=${UPLOAD_PATH:/app/uploads}/

# Notify polling token (사내 우분투 폴러용 — 환경변수로 주입)
app.notify.token=${NOTIFY_API_TOKEN}
