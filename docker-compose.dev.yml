# ===== Dev 환경 =====
# 실행: docker compose -p green-forest-dev -f docker-compose.dev.yml --env-file .env.dev up --build
#
# DB 마이그레이션 (prod → dev):
#   1. prod 서버에서 덤프: docker exec greenforest-mysql-prod mysqldump -uroot -p vgc_db > dump.sql
#   2. dev에 복원: docker exec -i greenforest-mysql-dev mysql -uroot -p vgc_db_dev < dump.sql

services:
  mysql:
    image: mysql:8.0
    container_name: greenforest-mysql-dev
    ports:
      - "3308:3306"           # 로컬에서 직접 접속 시 localhost:3308
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: vgc_db_dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: greenforest-backend-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: vgc_db_dev
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_PATH: /app/uploads
      NOTIFY_API_TOKEN: ${NOTIFY_API_TOKEN}
    volumes:
      - ./backend/src:/app/src
      - ./backend/build.gradle:/app/build.gradle
      - ./backend/settings.gradle:/app/settings.gradle
      - gradle_cache:/root/.gradle
      - uploads_dev:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: greenforest-frontend-dev
    env_file:
      - ./frontend/.env.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: greenforest-nginx-dev
    ports:
      - "8080:80"             # 로컬 개발: http://localhost:8080
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_dev:/app/uploads:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  # name을 고정하여 compose project name이 바뀌어도 동일 볼륨을 재사용한다.
  # (과거 project명 변경으로 빈 볼륨이 새로 생긴 사고 재발 방지)
  mysql_dev_data:
    name: green-forest_mysql_dev_data
  uploads_dev:
    name: green-forest_uploads_dev
  gradle_cache:
    name: green-forest_gradle_cache_dev
